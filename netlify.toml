[build]
  publish = "."
  command = ""

[functions]
  directory = "netlify/functions"
  included_files = ["data/products/**"]

[[redirects]]
  from = "/data/products.json"
  to = "/.netlify/functions/products"
  status = 200
  force = true

[[redirects]]
  from = "/feed.xml"
  to = "/.netlify/functions/product-feed"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
